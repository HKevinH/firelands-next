# Firelands World Server Configuration

Network:
  BindAddress: "0.0.0.0"
  Port: 8085
  # While in world: interval between SMSG_TIME_SYNC_REQ (ms), clamped 2000–3600000.
  # Driven by steady_timer, not chained on each CMSG_TIME_SYNC_RESP (avoids client flood).
  TimeSyncPeriodMs: 300000

# Interactive stdin on the world process (same commands as in-game: .help, etc.).
# Disabled automatically when stdout is not a TTY (e.g. Docker without -t).
Console:
  Enabled: true
  # With a TTY, the world process always uses the full-screen FTXUI console (no YAML toggle).
  # Tip: set Log.StickyBanner to false while using the console (sticky banner fights the TUI).

# Persistent outbound TCP to auth (realm online / instant offline on crash).
# Must match authserver.yaml RealmLink.Token and realmlist id.
RealmLink:
  # Must match authserver.yaml RealmLink (Token + Port) and realmlist id.
  Enabled: true
  AuthHost: "127.0.0.1"
  AuthPort: 3725
  RealmId: 1
  Token: "7f60c01601f61a28210fbfd729313d98074443838bda1fe9ca18d4a7198e4330"

# Realm label for auth/realm link; not sent in name-query (chat shows plain name).
World:
  RealmName: "Firelands"

# Global rate multipliers (1.0 = Blizzard default). Kill applies to creature XP on death.
Rates:
  Experience:
    Kill: 1.0
    Quest: 1.0
    Explore: 1.0

# Lua gameplay scripts (bootstrap.lua optional under this directory).
Scripting:
  ScriptsDirectory: "scripts/lua"

Database:
  User: "firelands"
  Password: "firelands"
  Auth:
    URI: "jdbc:mariadb://127.0.0.1:3306/firelands_auth"
  Characters:
    URI: "jdbc:mariadb://127.0.0.1:3306/firelands_characters"
  World:
    URI: "jdbc:mariadb://127.0.0.1:3306/firelands_world"

Log:
  Level: "Debug"
  File: "logs/firelands-world.log"
  StickyBanner: true

Motd:
  - "Welcome to Firelands WoW!"
  - "Enjoy your stay in the lands of Fire and Ice."

# Client DBC folder (4.3.4): CharStartOutfit, gt combat tables, Spell.dbc,
# SpellCastTimes.dbc, SpellRange.dbc, SpellDifficulty.dbc (raid/dungeon spell
# id variants), Languages.dbc, etc.
# XP-to-next-level for the experience bar comes from the world DB table
# `player_xp_for_level` (bundled in sql/bundled/firelands_world.sql), not
# from a loose client file.
Data:
  DbcPath: "data/dbc"

# Collision & pathfinding data root (extracted from client via firelands-* tools).
# When set, enables real LineOfSight and navmesh pathfinding via Detour.
# Expected layout: <DataRoot>/vmaps/ and <DataRoot>/mmaps/
# Leave empty to use the permissive stub (no collision, straight-line movement).
Collision:
  DataRoot: ""
