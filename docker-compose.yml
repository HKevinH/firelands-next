services:
  db:
    image: mysql:8.0
    container_name: firelands_db
    restart: always
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password", "--require-secure-transport=OFF", "--ssl=0", "--max-allowed-packet=512M"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: firelands
      MYSQL_USER: firelands
      MYSQL_PASSWORD: firelands
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql-init/docker_grants_firelands_user.sql:/docker-entrypoint-initdb.d/00-grants.sql
      - ./sql/init/auth_schema.sql:/docker-entrypoint-initdb.d/01-auth-schema.sql
      - ./sql/init/auth_seed.sql:/docker-entrypoint-initdb.d/02-auth-seed.sql
      - ./sql/init/characters_schema.sql:/docker-entrypoint-initdb.d/03-characters-schema.sql
      - ./sql/init/characters_seed.sql:/docker-entrypoint-initdb.d/04-characters-seed.sql
      - ./sql/init/world_schema.sql:/docker-entrypoint-initdb.d/05-world-schema.sql
      - ./sql/init/world_seed.sql:/docker-entrypoint-initdb.d/06-world-seed.sql
      - ./sql/init/world_schema_quest.sql:/docker-entrypoint-initdb.d/07-world-schema-quest.sql
      - ./sql/init/world_schema_creature.sql:/docker-entrypoint-initdb.d/08-world-schema-creature.sql
      - ./sql/init/world_schema_gossip.sql:/docker-entrypoint-initdb.d/09-world-schema-gossip.sql
      - ./sql/init/world_schema_spell.sql:/docker-entrypoint-initdb.d/10-world-schema-spell.sql
      - ./sql/init/world_schema_player.sql:/docker-entrypoint-initdb.d/11-world-schema-player.sql
      - ./sql/init/world_schema_gameobject.sql:/docker-entrypoint-initdb.d/12-world-schema-gameobject.sql
      - ./sql/init/world_seed_quest_data.sql:/docker-entrypoint-initdb.d/13-world-seed-quest-data.sql
