# Firelands Auth Server Configuration

# With a TTY, the auth process always uses the full-screen FTXUI log console (no YAML toggle).
Console:
  Enabled: true

Network:
  BindAddress: "0.0.0.0"
  Port: 3724
  RestPort: 8081

# Internal TCP from worldserver: marks realm online in memory immediately.
# Set Token to a long random string; world must use the same Token and RealmId.
RealmLink:
  Enabled: true
  BindAddress: "127.0.0.1"
  Port: 3725
  Token: "7f60c01601f61a28210fbfd729313d98074443838bda1fe9ca18d4a7198e4330"

# When true, AUTH_REALM_LIST sends an empty realm display name so the 4.3.4
# client does not append "-Realm" in chat (realm row in the list may look blank).
RealmList:
  HideRealmSuffixInAuthList: false

Database:
  User: "firelands"
  Password: "firelands"
  Auth:
    URI: "jdbc:mariadb://localhost:3306/firelands_auth"
  Characters:
    URI: "jdbc:mariadb://localhost:3306/firelands_characters"
Log:
  Level: "Info"
  File: "logs/firelands-auth.log"
  # true = fixed banner (ANSI scroll region); false = normal terminal scrollback
  StickyBanner: true
